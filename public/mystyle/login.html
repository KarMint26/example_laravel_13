<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Login - AeroLink</title>
    <link rel="icon" href="images/logo/logo.png" type="image/x-icon">
    <link rel="stylesheet" href="css/log-reg-style.css">
</head>
<body>
<form class="form" action="index.html">
    <img src="images/logo/logo-4-nobg.png" alt="AeroLink Logo">
    <p class="title">Welcome Back</p>
    <p class="message">Login to your account to continue.</p>

    <label>
        <input required="" placeholder="" type="text" class="input">
        <span>Username</span>
    </label>

    <label>
        <input required="" placeholder="" type="password" class="input">
        <span>Password</span>
    </label>

    <a class="forgot" href="#">Forgot password?</a>

    <button class="submit">Login</button>
    <p class="signin">Don't have an account? <a href="register.html">Register</a></p>
</form>
</body>
</html>
